services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    # Lokales Build-Image — kein Pull von ghcr.io und kein :latest
    image: open-webui:local
    pull_policy: never
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      # Ollama läuft außerhalb von Compose (z. B. nativ auf dem Host)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_SECRET_KEY=
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  open-webui: {}
